<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi única estrella</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-dark: #ff0a54;
            --pink-light: #ff85a1;
            --glass: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Montserrat', sans-serif;
        }

        /* Fondo Animado con Gradiente Radial */
        .canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2b0011 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        /* Tarjeta con Efecto Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            color: white;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            animation: cardEntrance 1.5s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateZ(-200px) rotateX(20deg); }
            to { opacity: 1; transform: translateZ(0) rotateX(0); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            background: linear-gradient(to right, #ff0a54, #ff85a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .typewriter {
            font-size: 1.1rem;
            line-height: 1.8;
            min-height: 100px;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            background-color: var(--pink-dark);
            margin-left: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Botón de Neón */
        .btn-neon {
            margin-top: 30px;
            padding: 15px 35px;
            border: none;
            background: var(--pink-dark);
            color: white;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 0 20px rgba(255, 10, 84, 0.4);
        }

        .btn-neon:hover {
            box-shadow: 0 0 40px rgba(255, 10, 84, 0.8);
            transform: scale(1.05);
        }

        /* Partículas de Corazón */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="canvas-bg"></div>

    <div class="container">
        <div class="glass-card">
            <h1>Para Ti</h1>
            <div class="typewriter" id="text"></div>
            <span class="cursor"></span>
            <br>
            <button class="btn-neon" onclick="createHeartShower()">Tócame ❤️</button>
        </div>
    </div>

    <script>
        const message = "Sé que me equivoqué en la forma de hablarte. No quiero excusas, solo quiero pedirte perdón de corazón. Eres lo más especial que tengo y me duele haberte herido. ¿Podemos volver a empezar?";
        let i = 0;
        const speed = 70; // Velocidad de escritura

        function typeWriter() {
            if (i < message.length) {
                document.getElementById("text").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        function createHeartShower() {
            for(let j=0; j<30; j++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'particle';
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.top = '-5vh';
                    heart.style.fontSize = Math.random() * 20 + 20 + 'px';
                    heart.style.duration = Math.random() * 3 + 2 + 's';
                    heart.style.opacity = Math.random();
                    heart.style.animation = `fall ${heart.style.duration} linear forwards`;
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 5000);
                }, j * 100);
            }
        }

        // Iniciar escritura al cargar
        window.onload = typeWriter;
    </script>
</body>
</html>
