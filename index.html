<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi chica</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            animation: fadeIn 2s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .heart-btn {
            background: #d81b60;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 20px;
        }
        .heart-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Lo siento...</h1>
        <p>No encontré las palabras adecuadas en ese momento, pero encontré el código para decirte que me importas.</p>
        <p><b>Perdón por cómo te hablé.</b></p>
        <button class="heart-btn" onclick="alert('Te quiero mucho ❤️')">Presiona aquí</button>
    </div>
</body>
</html>
