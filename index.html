<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña</title>
    <!-- Fuente elegante de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff758f;
            --bg: #fff0f3;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #444;
        }

        /* Corazones flotantes de fondo */
        .bg-heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.2);
            font-size: 20px;
            z-index: -1;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(255, 77, 109, 0.2);
            text-align: center;
            max-width: 380px;
            width: 90%;
            position: relative;
            transform: scale(0);
            animation: popIn 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards;
        }

        @keyframes popIn {
            to { transform: scale(1); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary);
            font-size: 2.8rem;
            margin: 0 0 15px 0;
        }

        p {
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .highlight {
            color: var(--primary);
            font-weight: 600;
            display: block;
            margin-top: 10px;
        }

        .heart-main {
            font-size: 60px;
            color: var(--primary);
            animation: pulse 1.5s infinite;
            display: inline-block;
            margin-bottom: 10px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        .btn:hover {
            background: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.6);
        }
    </style>
</head>
<body>

    <!-- Generador de corazones de fondo con JS simple -->
    <script>
        for (let i = 0; i < 15; i++) {
            let heart = document.createElement('div');
            heart.className = 'bg-heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.delay = Math.random() * 5 + 's';
            document.body.appendChild(heart);
        }
    </script>

    <div class="card">
        <div class="heart-main">❤️</div>
        <h1>Lo siento, amor</h1>
        <p>No fue la forma correcta de hablarte. <br>
           <span class="highlight">Me equivoqué y te herí.</span>
        </p>
        <p>Perdón por mis palabras. Eres lo más importante y quiero que estemos bien.</p>
        <button class="btn" onclick="alert('Prometo escucharte mejor ❤️')">Acepto mi error</button>
    </div>

</body>
</html>
