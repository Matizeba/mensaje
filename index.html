<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi única estrella</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050505;
            font-family: 'Quicksand', sans-serif; color: white;
        }

        /* Fondo de estrellas */
        #canvas {
            position: fixed; top: 0; left: 0; z-index: 1;
        }

        .container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; text-align: center; padding: 20px;
        }

        .name {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 3.5rem;
            background: linear-gradient(to bottom, #fff, #ff4d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255, 77, 109, 0.5));
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #text {
            font-size: 1.2rem; line-height: 1.6; min-height: 100px;
        }

        .btn {
            margin-top: 30px; padding: 15px 35px;
            border: none; border-radius: 50px;
            background: #ff4d6d; color: white;
            font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        .btn:active { transform: scale(0.95); }

        .heart-particle {
            position: fixed; pointer-events: none;
            animation: fly 2s linear forwards;
        }

        @keyframes fly {
            to { transform: translateY(-100vh) translateX(calc(-50% + 50px)); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="name" id="display-name">PARA TI</div>
        <div class="glass-card">
            <div id="text"></div>
            <button class="btn" onclick="suprise()">¿Me perdonas?</button>
        </div>
    </div>

    <script>
        // 1. CONFIGURACIÓN (Cambia esto)
        const nombreVal = "GRACE"; // <--- PON SU NOMBRE AQUÍ
        const mensajeVal = "Se equivoqué en la forma de hablarte. No quiero escusas solo quiero pedirte de corazon  que me perdones. Perdoname por mis palabras aveces hablo sin pensar que paresco el LARA ❤️"
        
        document.getElementById('display-name').innerText = nombreVal;

        // 2. EFECTO DE ESCRITURA (TYPEWRITER)
        let index = 0;
        function typeWriter() {
            if (index < mensajeVal.length) {
                document.getElementById("text").innerHTML += mensajeVal.charAt(index);
                index++;
                setTimeout(typeWriter, 50);
            }
        }
        // Empezar a escribir apenas cargue
        window.onload = typeWriter;

        // 3. FONDO DE ESTRELLAS
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = [];
            for(let i=0; i<150; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2,
                    v: Math.random() * 0.5
                });
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            dots.forEach(d => {
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
                ctx.fill();
                d.y -= d.v;
                if(d.y < 0) d.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        draw();

        // 4. SORPRESA DEL BOTÓN
        function suprise() {
            for(let i=0; i<30; i++) {
                const h = document.createElement('div');
                h.className = 'heart-particle';
                h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.top = '100vh';
                h.style.fontSize = (Math.random() * 20 + 10) + 'px';
                h.style.animationDuration = (Math.random() * 5 + 1) + 's';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 5000);
            }
            alert("Te amo mucho. Gracias por leyerme .");
        }
    </script>
</body>
</html>
